<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

    <div class="container">
        <h1 class="text-center">DANH SÁCH THIẾT BỊ</h1>
        <a class="btn btn-primary" th:href="@{/addDevice}">Thêm thiết bị</a>
        <div th:if="${emptyDevice}">
            <p th:text="${emptyDevice}"></p>
        </div>

        <div th:unless="${emptyDevice}">
            <table class="table table-header">
                <tr>
                    <td>Mã thiết bị</td>
                    <td>Tên thiết bị</td>
                    <td>Thương hiệu</td>
                    <td>Giá</td>
                    <td>
                        Ảnh thiết bị
                    </td>
                    <td>Hành động</td>
                </tr>

                <tr th:each="device: ${deviceList}">
                    <td th:text="${device.id}"></td>
                    <td th:text="${device.deviceName}"></td>
                    <td th:text="${device.brand}"></td>
                    <td th:text="${device.price}"></td>
                    <td>
                        <img th:src="@{'/anhthietbi/' + ${device.deviceImage}}"
                             width="50" class="rounded shadow-sm" alt="Avatar">
                    </td>
                    <td>
                    <td>
                        <a th:href="@{/editDevice/{id}(id=${device.id})}" class="btn btn-warning btn-sm">Sửa</a>
                        <a th:href="@{/deleteDevice/{id}(id=${device.id})}" class="btn btn-danger" onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xoá</a>
                    </td>
                    </td>
                </tr>
            </table>
        </div>
    </div>


<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
